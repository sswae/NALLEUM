<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NALLEUM</title>
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <link rel="icon" href="favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <style>
        /* ── Color Palette ── */
        :root {
            --c-bg: #78a2b9;
            --c-ink: #17354d;
            --c-paper: #fffac1;
            --c-btn-bg: #1a2a3a;
            --c-accent: #e46b22;
            --c-card: #3b74a7;
            --c-card-light: #5a8fb1;
            --c-highlight: #f8cf39;
            --c-font: 'Press Start 2P', cursive;
            --c-bg-pattern: none;
        }

        /* ── Move Popup ── */
        .move-popup {
            position: absolute;
            z-index: 2000;
            background: var(--c-paper);
            border: 1px solid var(--c-ink);
            border-bottom-width: 3px;
            display: flex;
            flex-direction: column;
            min-width: 70px;
        }
        .move-popup-option {
            padding: 6px 10px;
            font-family: var(--c-font);
            font-size: 8px;
            color: var(--c-ink);
            cursor: pointer;
        }
        .move-popup-option:hover { background: var(--c-highlight); }
        .move-popup-option + .move-popup-option { border-top: 1px solid rgba(0,0,0,0.15); }

        /* ── Reset & Base ── */
        * { box-sizing: border-box; text-shadow: none !important; box-shadow: none !important; }

        body {
            background-color: var(--c-bg);
            background-image: var(--c-bg-pattern);
            font-family: var(--c-font);
            margin: 0;
            display: flex;
            justify-content: center;
            transition: background-color 0.25s ease;
        }

        #app {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* ── Loading Screen ── */
        #loading-screen {
            position: fixed;
            inset: 0;
            background-color: var(--c-ink);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            cursor: pointer;
        }

        /* ── Header ── */
        header { text-align: center; margin-bottom: 30px; }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        h1 {
            font-size: 28px;
            color: var(--c-ink);
            letter-spacing: 2px;
            margin-top: 50px;
            margin-bottom: 60px;
        }

        /* ── Navigation Tabs ── */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: 2px solid var(--c-ink);
            border-radius: 20px;
            padding: 8px 15px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            color: var(--c-ink);
            transition: transform 0.08s ease, background-color 0.1s;
        }

        .tab-btn.active { background-color: var(--c-paper); }

        /* ── Music Button ── */
        .music-btn {
            background: none;
            border: 2px solid var(--c-ink);
            border-radius: 20px;
            padding: 5px 10px;
            font-family: inherit;
            font-size: 9px;
            cursor: pointer;
            color: var(--c-ink);
            transition: transform 0.08s ease, background-color 0.1s;
        }

        .music-btn.playing {
            background-color: var(--c-accent);
            color: var(--c-paper);
        }

        /* ── Pixel Buttons (shared press effect) ── */
        .btn-pixel {
            background-color: var(--c-btn-bg);
            color: var(--c-paper);
            border: 2px solid #000;
            border-bottom-width: 4px;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
            font-family: var(--c-font);
            transition: transform 0.08s ease, border-bottom-width 0.08s ease;
        }

        /* ── Arcade Press Effect ── */
        .btn-pixel:active,
        .tab-btn:active,
        .music-btn:active {
            transform: translateY(2px);
        }

        .btn-pixel:active {
            border-bottom-width: 2px;
        }

        /* ── Editor Box ── */
        .editor-box {
            background-color: var(--c-paper);
            border: 1px solid var(--c-ink);
            padding: 15px;
            margin-bottom: 20px;
            transition: border-color 0.15s, background-color 0.15s;
        }

        .editor-box.drag-over {
            border: 2px dashed var(--c-accent);
            background-color: #fff8a0;
        }

        .post-input {
            width: 100%;
            background: transparent;
            border: none;
            resize: vertical;
            font-family: sans-serif;
            font-size: 14px;
            outline: none;
            min-height: 100px;
            color: var(--c-ink);
        }

        .editor-controls {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        /* ── Image Preview ── */
        .preview-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .preview-item {
            position: relative;
            width: 50px;
            height: 50px;
            border: 1px solid var(--c-ink);
        }

        .preview-item img { width: 100%; height: 100%; object-fit: cover; }

        .preview-remove {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--c-accent);
            color: white;
            border-radius: 20%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            font-family: sans-serif;
        }

        /* ── Post List ── */
        .post-item {
            border-bottom: 1px solid var(--c-ink);
            padding: 15px 0;
            color: var(--c-ink);
            display: flex;
            flex-direction: column;
        }

        .post-item > div:nth-child(2) { white-space: pre-wrap; word-break: break-all; }

        .post-actions {
            align-self: flex-end;
            display: flex;
            gap: 8px;
            font-size: 7px;
            color: var(--c-paper);
            cursor: pointer;
            margin-bottom: 5px;
        }

        /* ── Diary Cards ── */
        .diary-card {
            background-color: var(--c-card);
            border: 2px solid var(--c-ink);
            margin-bottom: 25px;
            padding: 15px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.08s ease, border-bottom-width 0.08s ease;
            border-bottom-width: 5px;
        }

        .diary-card:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }

        .diary-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border: 1px solid var(--c-ink);
            background-color: var(--c-card-light);
            margin-bottom: 12px;
            display: block;
        }

        .diary-card-title {
            color: var(--c-paper);
            font-family: sans-serif;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 2px;
        }

        .diary-card-date {
            color: var(--c-paper);
            font-size: 8px;
            font-family: var(--c-font);
            opacity: 0.8;
            letter-spacing: -0.5px;
        }

        .gb-buttons {
            position: absolute;
            right: 15px;
            bottom: 15px;
            display: flex;
            gap: 8px;
            transform: rotate(-30deg);
        }

        .gb-btn {
            width: 22px;
            height: 22px;
            background-color: var(--c-ink);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--c-font);
            font-size: 10px;
            color: var(--c-card-light);
        }

        /* ── Diary Detail View ── */
        #diary-detail-view {
            display: none;
            color: var(--c-ink);
            min-height: 500px;
            padding-bottom: 50px;
        }

        .detail-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid var(--c-ink);
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .detail-title {
            font-size: 20px;
            font-family: sans-serif;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--c-ink);
        }

        .detail-date {
            font-family: var(--c-font);
            font-size: 10px;
            color: var(--c-paper);
        }

        .detail-actions {
            display: flex;
            gap: 10px;
            font-size: 8px;
            font-family: var(--c-font);
            color: var(--c-paper);
            cursor: pointer;
        }

        .detail-images img {
            width: 100%;
            margin-bottom: 15px;
            border: 1px solid var(--c-ink);
            cursor: zoom-in;
        }

        .detail-content {
            font-family: sans-serif;
            font-size: 15px;
            line-height: 1.7;
            color: var(--c-ink);
            margin-bottom: 30px;
        }

        /* ── Diary Full Editor ── */
        #diary-full-editor {
            display: none;
            background-color: var(--c-paper);
            border: 1px solid var(--c-ink);
            padding: 20px;
        }

        #diaryTitleInput {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--c-ink);
            font-family: sans-serif;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 0;
            outline: none;
            margin-bottom: 15px;
        }

        #diaryContentInput {
            width: 100%;
            background: transparent;
            border: none;
            resize: none;
            font-family: sans-serif;
            font-size: 14px;
            outline: none;
            min-height: 250px;
            line-height: 1.6;
        }

        /* ── Image Modal ── */
        #imgModal {
            display: none;
            position: fixed;
            z-index: 9999;
            inset: 0;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            cursor: default;
        }

        #modalImgWrap {
            width: 88vw;
            height: 88vh;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #modalImgWrap.zoomed {
            align-items: flex-start;
            justify-content: flex-start;
            cursor: grab;
        }
        #modalImgWrap.zoomed:active { cursor: grabbing; }

        #modalImg {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            user-select: none;
            display: block;
        }
        #modalImgWrap.zoomed #modalImg {
            max-width: none;
            max-height: none;
        }

        #modalClose {
            position: absolute;
            top: 16px; right: 20px;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            opacity: 0.7;
            line-height: 1;
        }
        #modalClose:hover { opacity: 1; }

        #modalPrev, #modalNext {
            position: absolute;
            top: 50%; transform: translateY(-50%);
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            opacity: 0.6;
            padding: 10px 16px;
            user-select: none;
            transition: opacity 0.15s;
        }
        #modalPrev:hover, #modalNext:hover { opacity: 1; }
        #modalPrev { left: 10px; }
        #modalNext { right: 10px; }
        #modalPrev.hidden, #modalNext.hidden { visibility: hidden; }

        #modalCounter {
            position: absolute;
            bottom: 18px;
            left: 50%; transform: translateX(-50%);
            font-family: var(--c-font);
            font-size: 9px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
        }

        #modalZoomControls {
            position: absolute;
            bottom: 14px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--c-font);
            color: rgba(255,255,255,0.7);
        }
        #modalZoomControls .zoom-btn {
            cursor: pointer;
            padding: 4px 10px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            font-size: 12px;
            user-select: none;
            transition: background 0.15s, opacity 0.15s;
        }
        #modalZoomControls .zoom-btn:hover { background: rgba(255,255,255,0.12); }
        #modalZoomLabel {
            font-size: 9px;
            min-width: 38px;
            text-align: center;
        }

        /* ── Misc ── */
        #audio-player { display: none; }

        .backup-text {
            font-size: 10px;
            color: var(--c-btn-bg);
            cursor: pointer;
            transition: color 0.3s;
        }

        .backup-text:hover { color: #ffffff; }

        /* ── Pagination ── */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            padding-bottom: 20px;
            flex-wrap: wrap;
        }

        .page-btn {
            cursor: pointer;
            color: var(--c-paper);
            font-family: var(--c-font);
            font-size: 10px;
            transition: transform 0.08s ease;
            padding: 2px 3px;
        }

        .page-btn:active { transform: scale(0.9); }
        .page-btn.active { color: var(--c-accent); text-decoration: underline; }

        .page-ellipsis {
            color: var(--c-paper);
            opacity: 0.5;
            font-family: var(--c-font);
            font-size: 10px;
        }

        .page-nav {
            cursor: pointer;
            color: var(--c-paper);
            font-family: var(--c-font);
            font-size: 9px;
            opacity: 0.75;
            transition: opacity 0.15s, transform 0.08s ease;
            padding: 2px 4px;
        }
        .page-nav:hover { opacity: 1; }
        .page-nav:active { transform: scale(0.9); }
        .page-nav.disabled { opacity: 0.2; pointer-events: none; }

        /* ── Global Search Bar ── */
        .global-search-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            margin-bottom: 14px;
        }

        .search-icon { font-size: 11px; opacity: 0.4; color: var(--c-ink); flex-shrink: 0; }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(23, 53, 77, 0.3);
            padding: 4px 2px;
            font-family: var(--c-font);
            font-size: 8px;
            color: var(--c-ink);
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus { border-bottom-color: rgba(23, 53, 77, 0.65); }
        .search-input::placeholder { color: var(--c-ink); opacity: 0.3; }

        .search-clear {
            font-size: 10px;
            color: var(--c-ink);
            opacity: 0;
            cursor: pointer;
            transition: opacity 0.15s;
            flex-shrink: 0;
        }

        .search-clear.visible { opacity: 0.35; }
        .search-clear.visible:hover { opacity: 0.7; }

        .search-count {
            font-family: var(--c-font);
            font-size: 8px;
            color: var(--c-highlight);
            text-align: right;
            margin-bottom: 10px;
            min-height: 14px;
        }

        mark.hl {
            background: var(--c-highlight);
            color: var(--c-ink);
            border-radius: 2px;
            padding: 0 1px;
        }

        .filter-bar {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 8px;
        }

        .img-filter-btn {
            background: none;
            border: 1px solid var(--c-ink);
            border-radius: 12px;
            padding: 3px 8px;
            font-family: var(--c-font);
            font-size: 7px;
            color: var(--c-ink);
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.15s, background-color 0.1s, transform 0.08s ease;
        }
        .img-filter-btn:hover { opacity: 0.9; }
        .img-filter-btn:active { transform: scale(0.94); }
        .img-filter-btn.active {
            background-color: var(--c-ink);
            color: var(--c-paper);
            opacity: 1;
        }

        /* ── Arcade Loading / Error Text ── */
        .bounce-letter {
            display: inline-block;
            animation: letterBounce 1s ease-in-out infinite;
        }
        @keyframes letterBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .fail-flicker {
            display: inline-block;
            animation: failFlicker 1s steps(2, start) infinite;
        }
        @keyframes failFlicker {
            0%, 100% { opacity: 1; color: var(--c-paper); }
            50%      { opacity: 0.35; color: var(--c-accent); }
        }

        .retry-link {
            display: inline-block;
            text-decoration: underline;
            cursor: pointer;
            color: var(--c-highlight);
        }

        /* ── Animations ── */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinning { animation: spin 3s linear infinite; }

        @keyframes blink-color {
            0%, 100% { color: var(--c-paper); }
            50% { color: var(--c-highlight); }
        }

        .blinking-text {
            font-family: var(--c-font);
            font-size: 16px;
            animation: blink-color 1s infinite;
        }

        /* ── Coin insert flash on load ── */
        @keyframes coin-flash {
            0%   { opacity: 0; transform: scale(0.85); }
            15%  { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        #app { animation: coin-flash 0.4s ease-out both; }
    </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen" onclick="enterApp()">
    <div class="blinking-text">⭐️ PRESS START ⭐️</div>
</div>

<div id="app">
    <header>
        <div class="global-search-bar">
            <span class="search-icon">🔍</span>
            <input class="search-input" id="global-search" placeholder="SEARCH..." oninput="onSearch()" autocomplete="off">
            <span class="search-clear" id="search-clear-btn" onclick="clearSearch()">✕</span>
        </div>
        <div class="header-row">
            <span class="backup-text" onclick="backupToMarkdown()">✏️REPORT</span>
            <div style="display:flex; align-items:center; gap:8px;">
                <div id="star" style="font-size:20px;">⭐️</div>
                <button id="playBtn" class="music-btn" onclick="toggleMusic()">PLAY</button>
            </div>
        </div>

        <h1>NALLEUM</h1>

        <div class="nav-tabs">
            <button id="tabBubble" class="tab-btn active" onclick="switchTab('BUBBLE')">BUBBLE</button>
            <button id="tabNin"    class="tab-btn"        onclick="switchTab('NIN')">NIN</button>
            <button id="tabNeg"    class="tab-btn"        onclick="switchTab('NEG')">NEG</button>
            <button id="tabDiary"  class="tab-btn"        onclick="switchTab('DIARY')">DIARY</button>
        </div>
    </header>

    <audio id="audio-player" src="im-not-in-love.mp3" loop preload="auto"></audio>

    <!-- BUBBLE Tab -->
    <div id="bubble-container">
        <div class="editor-box" id="bubble-editor-box">
            <textarea id="bubble-text" class="post-input" placeholder="무슨 일이 일어나고 있나요"></textarea>
            <div id="bubble-previews" class="preview-container"></div>
            <div class="editor-controls">
                <input type="file" id="bubbleFile" multiple accept="image/*" onchange="handleImg(this, 'BUBBLE')" style="display:none">
                <button class="btn-pixel" onclick="document.getElementById('bubbleFile').click()">IMG</button>
                <button id="bubbleSendBtn" class="btn-pixel" onclick="savePost('BUBBLE')">SEND</button>
            </div>
        </div>
        <div class="filter-bar">
            <span class="img-filter-btn" id="bubble-img-filter" onclick="toggleImgFilter('BUBBLE')">🖼 IMG ONLY</span>
        </div>
        <div class="search-count" id="bubble-search-count"></div>
        <div id="bubble-list"></div>
        <div id="bubble-pagination" class="pagination"></div>
    </div>

    <!-- NIN Tab -->
    <div id="nin-container" style="display:none">
        <div class="editor-box" id="nin-editor-box">
            <textarea id="nin-text" class="post-input" placeholder="무슨 일이 일어나고 있나요"></textarea>
            <div id="nin-previews" class="preview-container"></div>
            <div class="editor-controls">
                <input type="file" id="ninFile" multiple accept="image/*" onchange="handleImg(this, 'NIN')" style="display:none">
                <button class="btn-pixel" onclick="document.getElementById('ninFile').click()">IMG</button>
                <button id="ninSendBtn" class="btn-pixel" onclick="savePost('NIN')">SEND</button>
            </div>
        </div>
        <div class="filter-bar">
            <span class="img-filter-btn" id="nin-img-filter" onclick="toggleImgFilter('NIN')">🖼 IMG ONLY</span>
        </div>
        <div class="search-count" id="nin-search-count"></div>
        <div id="nin-list"></div>
        <div id="nin-pagination" class="pagination"></div>
    </div>

    <!-- NEG Tab -->
    <div id="neg-container" style="display:none">
        <div class="editor-box" id="neg-editor-box">
            <textarea id="neg-text" class="post-input" placeholder="무슨 일이 일어나고 있나요"></textarea>
            <div id="neg-previews" class="preview-container"></div>
            <div class="editor-controls">
                <input type="file" id="negFile" multiple accept="image/*" onchange="handleImg(this, 'NEG')" style="display:none">
                <button class="btn-pixel" onclick="document.getElementById('negFile').click()">IMG</button>
                <button id="negSendBtn" class="btn-pixel" onclick="savePost('NEG')">SEND</button>
            </div>
        </div>
        <div class="filter-bar">
            <span class="img-filter-btn" id="neg-img-filter" onclick="toggleImgFilter('NEG')">🖼 IMG ONLY</span>
        </div>
        <div class="search-count" id="neg-search-count"></div>
        <div id="neg-list"></div>
        <div id="neg-pagination" class="pagination"></div>
    </div>

    <!-- DIARY Tab -->
    <div id="diary-container" style="display:none">
        <div style="text-align:right; margin-bottom:15px;">
            <span style="font-size:10px; color:var(--c-paper); cursor:pointer; font-family: var(--c-font);"
                  onclick="openDiaryEditor()">+ NEW ADVENTURE</span>
        </div>
        <div class="search-count" id="diary-search-count"></div>
        <div id="diary-list"></div>
    </div>

    <!-- Diary Detail -->

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
        getFirestore, collection, addDoc, getDocs, query, orderBy,
        doc, deleteDoc, updateDoc, getCountFromServer, limit, startAfter
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import {
        getStorage, ref, uploadBytes, getDownloadURL, deleteObject
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBHMSPEsozQp2ZcanrRWy0-ZE7aoxviDgE",
        authDomain: "nalleum.firebaseapp.com",
        projectId: "nalleum",
        storageBucket: "nalleum.firebasestorage.app",
        messagingSenderId: "889977175883",
        appId: "1:889977175883:web:553b25bd73cb0d758332ce"
    };

    const app     = initializeApp(firebaseConfig);
    const db      = getFirestore(app);
    const storage = getStorage(app);

    window.db      = db;
    window.storage = storage;
    window.fbActions = {
        ref, uploadBytes, getDownloadURL,
        addDoc, collection, getDocs, query, orderBy,
        doc, deleteDoc, updateDoc, deleteObject,
        getCountFromServer, limit
    };

    // ── Pagination state ──
    const POSTS_PER_PAGE = 20;

    // ── Arcade text helpers ──
    function bouncyText(text) {
        return text.split('').map((ch, i) =>
            `<span class="bounce-letter" style="animation-delay:${(i * 0.07).toFixed(2)}s">${ch === ' ' ? '&nbsp;' : ch}</span>`
        ).join('');
    }

    function loadingHTML() {
        return `<div style="color:var(--c-paper); text-align:center; padding:20px; font-size:10px;">${bouncyText('LOADING...')}</div>`;
    }

    function failHTML(retryOnclick) {
        return `<div style="color:var(--c-paper); text-align:center; padding:20px; font-size:10px;">
            <span class="fail-flicker">${bouncyText('LOAD FAILED.')}</span><br><br>
            <span class="retry-link" onclick="${retryOnclick}">💣 RETRY</span>
        </div>`;
    }

    // Fetches with automatic retry — helps when Firestore momentarily returns
    // an empty snapshot due to a flaky network / offline-cache fallback.
    async function fetchPostsWithRetry(type, attempts = 3) {
        for (let i = 0; i < attempts; i++) {
            try {
                const q      = query(collection(window.db, type), orderBy("createdAt", "desc"));
                const result = await getDocs(q);
                const docs   = result.docs.map(d => ({ id: d.id, ...d.data() }));
                if (docs.length > 0) return docs;
                if (i === attempts - 1) return { empty: true, docs: [] };
            } catch (e) {
                console.error(`fetch ${type} attempt ${i + 1} failed`, e);
                if (i === attempts - 1) throw e;
            }
            await new Promise(r => setTimeout(r, 500 * (i + 1))); // backoff
        }
        return { empty: true, docs: [] };
    }

    async function loadPosts(type, page = 1) {
        if (!window.fbAllPosts) window.fbAllPosts = {};

        if (page === 1 || !window.fbAllPosts[type]) {
            const listEl = document.getElementById(type.toLowerCase() + '-list');
            if (listEl) listEl.innerHTML = loadingHTML();

            let result;
            try {
                result = await fetchPostsWithRetry(type);
            } catch (e) {
                if (listEl) listEl.innerHTML = failHTML(`window.loadPosts('${type}',1)`);
                return;
            }

            // Still empty after retries: treat as a soft failure too — surface
            // a retry option rather than silently showing nothing, since we
            // can't distinguish "genuinely no posts" from a flaky fetch.
            if (result && result.empty && !window.fbAllPosts[type]) {
                if (listEl) listEl.innerHTML = failHTML(`window.loadPosts('${type}',1)`);
                return;
            }

            window.fbAllPosts[type] = Array.isArray(result) ? result : result.docs;
        }

        const all   = window.fbAllPosts[type];
        const total = Math.ceil(all.length / POSTS_PER_PAGE) || 1;
        const start = (page - 1) * POSTS_PER_PAGE;
        window[type.toLowerCase() + 'Posts'] = all.slice(start, start + POSTS_PER_PAGE);

        // show pagination (might be hidden during search)
        const pg = document.getElementById(type.toLowerCase() + '-pagination');
        if (pg) pg.style.display = 'flex';

        window.renderBoard(type);
        renderPagination(type, page, total);
        window.scrollTo(0, 0);
    }

    function renderPagination(type, current, total) {
        const container = document.getElementById(type.toLowerCase() + '-pagination');

        const pages = [];
        for (let i = 1; i <= total; i++) {
            if (i === 1 || i === total || Math.abs(i - current) <= 2) {
                pages.push(i);
            } else if (pages[pages.length - 1] !== '…') {
                pages.push('…');
            }
        }

        const prevDisabled = current <= 1 ? 'disabled' : '';
        const nextDisabled = current >= total ? 'disabled' : '';

        const numberHtml = pages.map(p =>
            p === '…'
                ? `<span class="page-ellipsis">···</span>`
                : `<span class="page-btn ${p === current ? 'active' : ''}" onclick="window.loadPosts('${type}', ${p})">${p}</span>`
        ).join('');

        container.innerHTML = `
            <span class="page-nav ${prevDisabled}" onclick="window.loadPosts('${type}', ${current - 1})">&#10094; PREV</span>
            ${numberHtml}
            <span class="page-nav ${nextDisabled}" onclick="window.loadPosts('${type}', ${current + 1})">NEXT &#10095;</span>
        `;
    }

    async function loadDiary() {
        const listEl = document.getElementById('diary-list');
        if (!window.diaryPosts) {
            listEl.innerHTML = `<div style="color:var(--c-paper); text-align:center; padding:20px; font-size:10px;">LOADING...</div>`;
        }
        try {
            for (let i = 0; i < 3; i++) {
                const q    = query(collection(window.db, 'DIARY'), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (docs.length > 0 || i === 2) { window.diaryPosts = docs; break; }
                await new Promise(r => setTimeout(r, 500 * (i + 1)));
            }
        } catch (e) {
            console.error('loadDiary failed', e);
            listEl.innerHTML = `<div style="color:var(--c-paper); text-align:center; padding:20px; font-size:10px;">
                LOAD FAILED.<br><br>
                <span style="text-decoration:underline; cursor:pointer; color:var(--c-highlight);" onclick="window.loadDiary()">💣 RETRY</span>
            </div>`;
            return;
        }
        window.renderBoard('DIARY');
    }

    function waitForRenderBoard() {
        return new Promise(resolve => {
            if (window.renderBoard) return resolve();
            const iv = setInterval(() => {
                if (window.renderBoard) { clearInterval(iv); resolve(); }
            }, 20);
        });
    }

    async function init() {
        await waitForRenderBoard();
        loadPosts('BUBBLE', 1);
        loadPosts('NIN', 1);
        loadPosts('NEG', 1);
        loadDiary();
    }

    init();

    window.loadPosts      = loadPosts;
    window.loadDiary      = loadDiary;
    window.renderPagination = renderPagination;
</script>

<!-- App Logic -->
<script>
    // ── State ──
    let tempImages = [];
    let tempBlobs  = [];
    let editDiaryId = null;
    let editPostId  = null;
    let player = null, isPlaying = false;
    const DEFAULT_IMAGES = ["default1.png", "default2.png"];

    // ── Loading screen ──
    function enterApp() {
        const loader = document.getElementById('loading-screen');
        loader.style.transition = 'opacity 0.5s';
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
    }

    window.addEventListener('load', enterApp);

    // ── Tab switching ──
    function switchTab(tab) {
        ['BUBBLE', 'NIN', 'NEG', 'DIARY'].forEach(t => {
            document.getElementById('tab' + t.charAt(0) + t.slice(1).toLowerCase()).classList.toggle('active', t === tab);
            document.getElementById(t.toLowerCase() + '-container').style.display = (t === tab) ? 'block' : 'none';
        });
        document.getElementById('diary-full-editor').style.display  = 'none';
        document.getElementById('diary-detail-view').style.display  = 'none';
    }

    // ── Search ──
    let searchQuery = '';
    const imgFilter = { BUBBLE: false, NIN: false, NEG: false };

    function toggleImgFilter(type) {
        imgFilter[type] = !imgFilter[type];
        document.getElementById(type.toLowerCase() + '-img-filter').classList.toggle('active', imgFilter[type]);

        const pg = document.getElementById(type.toLowerCase() + '-pagination');
        if (pg) pg.style.display = (imgFilter[type] || searchQuery) ? 'none' : 'flex';

        renderBoard(type);
    }

    function onSearch() {
        searchQuery = document.getElementById('global-search').value.trim();
        document.getElementById('search-clear-btn').classList.toggle('visible', searchQuery.length > 0);

        ['bubble', 'nin', 'neg'].forEach(t => {
            const pg = document.getElementById(t + '-pagination');
            if (pg) pg.style.display = (searchQuery || imgFilter[t.toUpperCase()]) ? 'none' : 'flex';
        });

        renderBoard('BUBBLE');
        renderBoard('NIN');
        renderBoard('NEG');
        renderBoard('DIARY');
    }

    function clearSearch() {
        searchQuery = '';
        document.getElementById('global-search').value = '';
        document.getElementById('search-clear-btn').classList.remove('visible');
        ['bubble', 'nin', 'neg'].forEach(t => {
            const countEl = document.getElementById(t + '-search-count');
            if (countEl) countEl.innerText = '';
        });
        const dc = document.getElementById('diary-search-count');
        if (dc) dc.innerText = '';

        // if img filter is active for a board, just re-render (no need to reload from server)
        ['BUBBLE', 'NIN', 'NEG'].forEach(t => {
            if (imgFilter[t]) renderBoard(t);
            else window.loadPosts(t, 1);
        });
        renderBoard('DIARY');
    }

    function highlight(text, kw) {
        if (!kw) return text;
        const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return text.replace(new RegExp(escaped, 'gi'), m => `<mark class="hl">${m}</mark>`);
    }

    // ── Render ──
    function linkify(text) {
        return text.replace(/(https?:\/\/[^\s]+)/g,
            url => `<a href="${url}" target="_blank" style="color:#227be4; text-decoration:underline;">${url}</a>`);
    }

    function renderBoard(type) {
        if (type === 'DIARY') return renderDiary();

        const kw          = searchQuery;
        const onlyImages  = imgFilter[type];
        const container   = document.getElementById(type.toLowerCase() + '-list');
        const countEl      = document.getElementById(type.toLowerCase() + '-search-count');

        // When searching or filtering, use full cache; otherwise use current page slice
        let posts = (kw || onlyImages)
            ? (window.fbAllPosts && window.fbAllPosts[type] || [])
            : (window[type.toLowerCase() + 'Posts'] || []);

        if (onlyImages) {
            posts = posts.filter(p => (p.images || []).length > 0);
        }

        if (kw) {
            const kwLower = kw.toLowerCase();
            posts = posts.filter(p => (p.content || '').toLowerCase().includes(kwLower));
        }

        if (kw || onlyImages) {
            if (countEl) countEl.innerText = `${posts.length} RESULT${posts.length !== 1 ? 'S' : ''} FOUND`;
        } else {
            if (countEl) countEl.innerText = '';
        }

        if (posts.length === 0 && (kw || onlyImages)) {
            container.innerHTML = `<div style="color:var(--c-paper); text-align:center; padding:20px; font-size:10px;">
                ${onlyImages && !kw ? 'NO IMAGE POSTS.' : 'NO RESULTS.'}
            </div>`;
            return;
        }

        container.innerHTML = posts.map(p => `
            <div class="post-item" data-id="${p.id}" data-type="${type}">
                <div class="post-actions">
                    <span onclick="startEditPost('${type}', '${p.id}')">EDIT</span>
                    <span onclick="movePostFromEl(this)">MOVE</span>
                    <span onclick="deletePostFromEl(this)">DEL</span>
                </div>
                <div style="font-family:sans-serif; font-size:14px; padding-right:10px;">${highlight(linkify(p.content), kw)} <span style="color:var(--c-paper); font-size:9px;">${p.date}</span></div>
                <div style="display:flex; gap:5px; margin-top:10px; flex-wrap:wrap;"
                     data-images='${(p.images||[]).map(u=>u.replace(/'/g,"&#39;")).join(",")}'>
                    ${(p.images || []).map(img =>
                        `<img src="${img}" onclick="openModalFromThumb(this)"
                              style="width:70px; height:70px; object-fit:cover; border:1px solid var(--c-ink); cursor:zoom-in;">`
                    ).join('')}
                </div>
            </div>
        `).join('');
    }

    function renderDiary() {
        const container = document.getElementById('diary-list');
        const kw        = searchQuery;
        const countEl   = document.getElementById('diary-search-count');
        let   posts     = window.diaryPosts || [];

        if (kw) {
            const kwLower = kw.toLowerCase();
            posts = posts.filter(p =>
                (p.title || '').toLowerCase().includes(kwLower) ||
                (p.content || '').toLowerCase().includes(kwLower)
            );
            if (countEl) countEl.innerText = `${posts.length} RESULT${posts.length !== 1 ? 'S' : ''} FOUND`;
        } else {
            if (countEl) countEl.innerText = '';
        }

        if (posts.length === 0) {
            container.innerHTML = `<div style="color:var(--c-paper); text-align:center; padding:20px; font-size:10px;">${kw ? 'NO RESULTS.' : 'NO ADVENTURES YET.'}</div>`;
            return;
        }

        container.innerHTML = posts.map(p => {
            const thumb = (p.images && p.images.length > 0)
                ? p.images[0]
                : DEFAULT_IMAGES[Math.floor(Math.random() * DEFAULT_IMAGES.length)];
            return `
                <div class="diary-card" onclick="openDiaryDetail('${p.id}')">
                    <img class="diary-thumb" src="${thumb}">
                    <div class="diary-card-info">
                        <div class="diary-card-title">${highlight(p.title, kw)}</div>
                        <div class="diary-card-date">${p.date}</div>
                    </div>
                    <div class="gb-buttons">
                        <div class="gb-btn">B</div>
                        <div class="gb-btn">A</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    window.renderBoard = renderBoard;

    // ── Diary navigation ──
    function openDiaryDetail(id) {
        const post = window.diaryPosts.find(p => p.id === id);
        if (!post) return;

        document.getElementById('diary-container').style.display   = 'none';
        document.getElementById('diary-detail-view').style.display = 'block';
        document.getElementById('detailTitle').innerText   = post.title;
        document.getElementById('detailDate').innerText    = post.date;
        document.getElementById('detailContent').innerHTML = post.content.replace(/\n/g, '<br>');
        const imgs = post.images || [];
        const detailImgEl = document.getElementById('detailImages');
        detailImgEl.dataset.images = imgs.join(',');
        detailImgEl.innerHTML = imgs.map(img => `<img src="${img}" onclick="openModalFromThumb(this)">`).join('');
        document.getElementById('detailEditBtn').onclick = () => startEditDiary(post.id);
        document.getElementById('detailDelBtn').onclick  = () => deletePost('DIARY', post.id, post.images);

        window.scrollTo(0, 0);
    }

    function closeDiaryDetail() {
        document.getElementById('diary-detail-view').style.display = 'none';
        document.getElementById('diary-container').style.display   = 'block';
    }

    function openDiaryEditor() {
        document.getElementById('diary-container').style.display   = 'none';
        document.getElementById('diary-detail-view').style.display = 'none';
        document.getElementById('diary-full-editor').style.display = 'block';

        editDiaryId = null;
        document.getElementById('diarySendBtn').innerText     = 'SEND';
        document.getElementById('diaryTitleInput').value      = '';
        document.getElementById('diaryContentInput').value    = '';
        tempImages = [];
        tempBlobs  = [];
        updatePreview('diary-previews');
    }

    function closeDiaryEditor() {
        document.getElementById('diary-full-editor').style.display = 'none';
        document.getElementById('diary-container').style.display   = 'block';
    }

    // ── Image handling ──
    function toWebP(file, quality = 0.85) {
        return new Promise(resolve => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width  = img.naturalWidth;
                canvas.height = img.naturalHeight;
                canvas.getContext('2d').drawImage(img, 0, 0);
                URL.revokeObjectURL(url);
                canvas.toBlob(blob => resolve(blob), 'image/webp', quality);
            };
            img.src = url;
        });
    }

    async function processImageFile(file, previewContainerId) {
        if (!file.type.startsWith('image/')) return;
        const blob    = await toWebP(file);
        const preview = URL.createObjectURL(blob);  // no base64, no size limit
        tempBlobs.push(blob);
        tempImages.push(preview);
        updatePreview(previewContainerId);
    }

    function handleImg(input, type) {
        const previewId = type.toLowerCase() + '-previews';
        Array.from(input.files).forEach(file => processImageFile(file, previewId));
        input.value = ''; // reset so same file can be re-added
    }

    function setupDragDrop(editorBoxId, previewContainerId) {
        const box = document.getElementById(editorBoxId);
        if (!box) return;

        box.addEventListener('dragover', e => {
            e.preventDefault();
            box.classList.add('drag-over');
        });
        box.addEventListener('dragleave', e => {
            if (!box.contains(e.relatedTarget)) box.classList.remove('drag-over');
        });
        box.addEventListener('drop', e => {
            e.preventDefault();
            box.classList.remove('drag-over');
            Array.from(e.dataTransfer.files).forEach(file => processImageFile(file, previewContainerId));
        });
    }

    // init drag-and-drop on all editor boxes
    setupDragDrop('bubble-editor-box', 'bubble-previews');
    setupDragDrop('neg-editor-box',    'neg-previews');
    setupDragDrop('diary-editor-box',  'diary-previews');

    function updatePreview(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = tempImages.map((src, i) => `
            <div class="preview-item">
                <img src="${src}">
                <div class="preview-remove" onclick="removeTempImage(${i}, '${containerId}')">×</div>
            </div>
        `).join('');
    }

    function removeTempImage(index, containerId) {
        tempImages.splice(index, 1);
        tempBlobs.splice(index, 1);
        updatePreview(containerId);
    }

    // ── Save post ──
    async function savePost(type) {
        const btnId = type.toLowerCase() + 'SendBtn';
        const btn   = document.getElementById(btnId);
        btn.innerText = "SAVING...";
        btn.disabled  = true;

        const now  = new Date();
        const date = `[${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}]`;
        const { ref, uploadBytes, getDownloadURL, addDoc, collection, updateDoc, doc } = window.fbActions;

        try {
            // Upload new WebP blobs
            const imageUrls = [];
            for (let i = 0; i < tempBlobs.length; i++) {
                const storageRef = ref(window.storage, `images/${Date.now()}_${i}.webp`);
                await uploadBytes(storageRef, tempBlobs[i], { contentType: 'image/webp' });
                imageUrls.push(await getDownloadURL(storageRef));
            }

            if (type === 'BUBBLE' || type === 'NEG' || type === 'NIN') {
                const inputEl = document.getElementById(type.toLowerCase() + '-text');
                const content = inputEl.value;

                if (editPostId) {
                    const merged = [...tempImages.filter(img => img.startsWith('http')), ...imageUrls];
                    await updateDoc(doc(window.db, type, editPostId), { content, images: merged });
                    editPostId = null;
                } else {
                    await addDoc(collection(window.db, type), { content, images: imageUrls, date, createdAt: Date.now() });
                }
                inputEl.value = '';
                if (window.fbAllPosts) delete window.fbAllPosts[type];
                window.loadPosts(type, 1);
            } else {
                const title   = document.getElementById('diaryTitleInput').value || "NO TITLE";
                const content = document.getElementById('diaryContentInput').value;

                if (editDiaryId) {
                    const merged = [...tempImages.filter(img => img.startsWith('http')), ...imageUrls];
                    await updateDoc(doc(window.db, "DIARY", editDiaryId), { title, content, images: merged });
                    editDiaryId = null;
                } else {
                    await addDoc(collection(window.db, "DIARY"), { title, content, images: imageUrls, date, createdAt: Date.now() });
                }
                closeDiaryEditor();
                window.loadDiary();
            }

            tempImages.forEach(url => { if (url.startsWith('blob:')) URL.revokeObjectURL(url); });
            tempImages = [];
            tempBlobs  = [];
            updatePreview(type.toLowerCase() + '-previews');
        } catch (e) {
            console.error(e);
            alert("저장 실패!");
        }

        btn.innerText = "SEND";
        btn.disabled  = false;
    }

    // ── Delete post ──
    const ALL_BOARDS = ['BUBBLE', 'NIN', 'NEG'];

    function movePostFromEl(el) {
        const item     = el.closest('.post-item');
        const fromType = item.dataset.type;
        const id       = item.dataset.id;
        const imgDiv   = item.querySelector('[data-images]');
        const images   = imgDiv && imgDiv.dataset.images ? imgDiv.dataset.images.split(',') : [];
        const targets  = ALL_BOARDS.filter(t => t !== fromType);

        openMoveTargetPopup(el, targets, (toType) => {
            movePost(fromType, toType, id, images);
        });
    }

    function openMoveTargetPopup(anchorEl, targets, onPick) {
        // remove any existing popup first
        const existing = document.getElementById('movePopup');
        if (existing) existing.remove();

        const popup = document.createElement('div');
        popup.id = 'movePopup';
        popup.className = 'move-popup';

        targets.forEach(t => {
            const opt = document.createElement('span');
            opt.className = 'move-popup-option';
            opt.innerText = t;
            opt.onclick = (e) => {
                e.stopPropagation();
                popup.remove();
                onPick(t);
            };
            popup.appendChild(opt);
        });

        document.body.appendChild(popup);

        const rect = anchorEl.getBoundingClientRect();
        popup.style.top  = (window.scrollY + rect.bottom + 4) + 'px';
        popup.style.left = Math.max(8, window.scrollX + rect.right - popup.offsetWidth) + 'px';

        // close on outside click
        setTimeout(() => {
            document.addEventListener('click', function closeOnce(e) {
                if (!popup.contains(e.target)) {
                    popup.remove();
                    document.removeEventListener('click', closeOnce);
                }
            });
        }, 0);
    }

    async function movePost(fromType, toType, id, images) {
        const { addDoc, collection, doc, deleteDoc } = window.fbActions;
        const fromPosts = window[fromType.toLowerCase() + 'Posts'] || [];
        const post      = (window.fbAllPosts?.[fromType] || fromPosts).find(p => p.id === id);
        if (!post) return;

        try {
            await addDoc(collection(window.db, toType), {
                content:   post.content,
                images:    post.images || [],
                date:      post.date,
                createdAt: post.createdAt || Date.now()
            });
            await deleteDoc(doc(window.db, fromType, id));

            if (window.fbAllPosts) {
                delete window.fbAllPosts[fromType];
                delete window.fbAllPosts[toType];
            }
            window.loadPosts(fromType, 1);
            window.loadPosts(toType, 1);
        } catch(e) {
            console.error(e);
            alert('이동 실패!');
        }
    }

    function deletePostFromEl(el) {
        const item   = el.closest('.post-item');
        const type   = item.dataset.type;
        const id     = item.dataset.id;
        const imgDiv = item.querySelector('[data-images]');
        const images = imgDiv && imgDiv.dataset.images ? imgDiv.dataset.images.split(',') : [];
        deletePost(type, id, images);
    }

    async function deletePost(type, id, images) {
        if (!confirm("✂️정말 삭제하시겠습니까?")) return;
        const { doc, deleteDoc, ref, deleteObject } = window.fbActions;
        try {
            await deleteDoc(doc(window.db, type, id));
            if (images) {
                for (const url of images) {
                    try {
                        const imgPath = decodeURIComponent(url.split('/o/')[1].split('?')[0]);
                        await deleteObject(ref(window.storage, imgPath));
                    } catch (e) {}
                }
            }
            if (type === 'DIARY') { closeDiaryDetail(); window.loadDiary(); }
            else {
                if (window.fbAllPosts) delete window.fbAllPosts[type];
                window.loadPosts(type, 1);
            }
        } catch (e) { console.error(e); }
    }

    // ── Edit ──
    function startEditPost(type, id) {
        const post = window[type.toLowerCase() + 'Posts'].find(x => x.id === id);
        document.getElementById(type.toLowerCase() + '-text').value = post.content;
        tempImages = [...(post.images || [])];
        updatePreview(type.toLowerCase() + '-previews');
        editPostId = id;
        document.getElementById(type.toLowerCase() + 'SendBtn').innerText = 'EDIT';
        window.scrollTo(0, 0);
    }

    function startEditDiary(id) {
        const post = window.diaryPosts.find(x => x.id === id);
        openDiaryEditor();
        document.getElementById('diaryTitleInput').value   = post.title;
        document.getElementById('diaryContentInput').value = post.content;
        tempImages = [...(post.images || [])];
        updatePreview('diary-previews');
        editDiaryId = id;
        document.getElementById('diarySendBtn').innerText = 'EDIT';
    }

    function openModalFromThumb(imgEl) {
        const container = imgEl.parentElement;
        const raw       = container.dataset.images || '';
        const images    = raw ? raw.split(',') : [imgEl.src];
        showModal(imgEl.src, images);
    }

    // ── Modal ──
    let modalImages = [];
    let modalIndex  = 0;
    let zoomLevel   = 1;
    const ZOOM_MIN  = 1;
    const ZOOM_MAX  = 40;   // 4000% — enough to view ~30,000px-tall images near native resolution
    const ZOOM_STEP = 1;    // 100% per step

    function showModal(src, images) {
        modalImages = images || [src];
        modalIndex  = modalImages.indexOf(src);
        if (modalIndex < 0) modalIndex = 0;
        zoomLevel = 1;
        renderModal();
        document.getElementById('imgModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('imgModal').style.display = 'none';
    }

    function renderModal() {
        document.getElementById('modalImg').src = modalImages[modalIndex];
        const total = modalImages.length;
        document.getElementById('modalCounter').innerText = total > 1 ? `${modalIndex + 1} / ${total}` : '';
        document.getElementById('modalPrev').classList.toggle('hidden', total <= 1);
        document.getElementById('modalNext').classList.toggle('hidden', total <= 1);
        applyZoom();
    }

    function modalNav(dir) {
        modalIndex = (modalIndex + dir + modalImages.length) % modalImages.length;
        zoomLevel = 1; // reset zoom when switching images
        renderModal();
    }

    // ── Zoom ──
    function applyZoom() {
        const img  = document.getElementById('modalImg');
        const wrap = document.getElementById('modalImgWrap');

        if (zoomLevel <= 1) {
            zoomLevel = 1;
            img.style.width  = '';
            img.style.height = '';
            wrap.classList.remove('zoomed');
            wrap.scrollTop  = 0;
            wrap.scrollLeft = 0;
        } else {
            img.style.width  = (zoomLevel * 100) + '%';
            img.style.height = (zoomLevel * 100) + '%';
            wrap.classList.add('zoomed');
        }
        document.getElementById('modalZoomLabel').innerText = Math.round(zoomLevel * 100) + '%';
    }

    function zoomIn()    { zoomLevel = Math.min(ZOOM_MAX, zoomLevel + ZOOM_STEP); applyZoom(); }
    function zoomOut()   { zoomLevel = Math.max(ZOOM_MIN, zoomLevel - ZOOM_STEP); applyZoom(); }
    function zoomReset() { zoomLevel = 1; applyZoom(); }

    // click backdrop to close
    document.getElementById('imgModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // click empty space around the image (inside the wrap) to close too —
    // skip while zoomed, since that area is used for panning/scrolling
    document.getElementById('modalImgWrap').addEventListener('click', function(e) {
        if (e.target === this && zoomLevel <= 1) closeModal();
    });

    // keyboard navigation + zoom shortcuts
    document.addEventListener('keydown', e => {
        if (document.getElementById('imgModal').style.display !== 'flex') return;

        // Ctrl/Cmd + (+/-/0) → zoom in/out/reset
        if (e.ctrlKey || e.metaKey) {
            if (e.key === '+' || e.key === '=') { e.preventDefault(); zoomIn(); return; }
            if (e.key === '-' || e.key === '_') { e.preventDefault(); zoomOut(); return; }
            if (e.key === '0') { e.preventDefault(); zoomReset(); return; }
        }

        if (e.key === 'ArrowLeft'  && zoomLevel === 1) modalNav(-1);
        if (e.key === 'ArrowRight' && zoomLevel === 1) modalNav(1);
        if (e.key === 'Escape') closeModal();
    });

    // ctrl + wheel to zoom
    document.getElementById('imgModal').addEventListener('wheel', e => {
        if (!(e.ctrlKey || e.metaKey)) return;
        e.preventDefault();
        if (e.deltaY < 0) zoomIn(); else zoomOut();
    }, { passive: false });

    // swipe support (only when not zoomed, to avoid conflicting with panning)
    let touchStartX = 0;
    document.getElementById('imgModal').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
    document.getElementById('imgModal').addEventListener('touchend',   e => {
        if (zoomLevel > 1) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 50) modalNav(dx < 0 ? 1 : -1);
    });

    // ── Music ──
    const audioPlayer = document.getElementById('audio-player');

    function toggleMusic() {
        const btn  = document.getElementById('playBtn');
        const star = document.getElementById('star');

        if (!isPlaying) {
            audioPlayer.play();
            btn.innerText = 'STOP';
            btn.classList.add('playing');
            star.classList.add('spinning');
        } else {
            audioPlayer.pause();
            btn.innerText = 'PLAY';
            btn.classList.remove('playing');
            star.classList.remove('spinning');
        }
        isPlaying = !isPlaying;
    }

    // ── Backup ──
    async function backupToMarkdown() {
        const { getDocs, collection, query, orderBy } = window.fbActions;
        const q    = query(collection(window.db, "BUBBLE"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);

        const zip       = new JSZip();
        const imgFolder = zip.folder("images");
        let md = "# NALLEUM BUBBLE BACKUP\n\n";

        for (const d of snap.docs) {
            const data = d.data();
            md += `## ${data.date}\n${data.content}\n`;

            if (data.images) {
                for (let i = 0; i < data.images.length; i++) {
                    const fileName = `img_${d.id}_${i}.png`;
                    const blob     = await (await fetch(data.images[i])).blob();
                    imgFolder.file(fileName, blob);
                    md += `![img](images/${fileName})\n`;
                }
            }

            md += "\n---\n\n";
        }

        zip.file("backup.md", md);
        const content = await zip.generateAsync({ type: "blob" });
        const a = document.createElement('a');
        a.href     = URL.createObjectURL(content);
        a.download = `nalleum_backup_${new Date().toISOString().split('T')[0]}.zip`;
        a.click();
    }

    // ── Ctrl+Enter to send ──
    ['bubble-text', 'neg-text', 'diaryContentInput'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                if (id === 'bubble-text')        savePost('BUBBLE');
                else if (id === 'neg-text')      savePost('NEG');
                else if (id === 'diaryContentInput') savePost('DIARY');
            }
        });
    });
</script>
