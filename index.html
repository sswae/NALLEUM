<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NALLEUM</title>
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <link rel="icon" href="favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <style>
        /* ── Reset & Base ── */
        * { box-sizing: border-box; text-shadow: none !important; box-shadow: none !important; }

        body {
            background-color: #78a2b9;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        #app {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* ── Loading Screen ── */
        #loading-screen {
            position: fixed;
            inset: 0;
            background-color: #17354d;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            cursor: pointer;
        }

        /* ── Header ── */
        header { text-align: center; margin-bottom: 30px; }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        h1 {
            font-size: 28px;
            color: #17354d;
            letter-spacing: 2px;
            margin-top: 50px;
            margin-bottom: 60px;
        }

        /* ── Navigation Tabs ── */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: 2px solid #17354d;
            border-radius: 20px;
            padding: 8px 15px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            color: #17354d;
            transition: transform 0.08s ease, background-color 0.1s;
        }

        .tab-btn.active { background-color: #fffac1; }

        /* ── Music Button ── */
        .music-btn {
            background: none;
            border: 2px solid #17354d;
            border-radius: 20px;
            padding: 5px 10px;
            font-family: inherit;
            font-size: 9px;
            cursor: pointer;
            color: #17354d;
            transition: transform 0.08s ease, background-color 0.1s;
        }

        .music-btn.playing {
            background-color: #e46b22;
            color: #fffac1;
        }

        /* ── Pixel Buttons (shared press effect) ── */
        .btn-pixel {
            background-color: #1a2a3a;
            color: #fffac1;
            border: 2px solid #000;
            border-bottom-width: 4px;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
            font-family: 'Press Start 2P';
            transition: transform 0.08s ease, border-bottom-width 0.08s ease;
        }

        /* ── Arcade Press Effect ── */
        .btn-pixel:active,
        .tab-btn:active,
        .music-btn:active {
            transform: translateY(2px);
        }

        .btn-pixel:active {
            border-bottom-width: 2px;
        }

        /* ── Editor Box ── */
        .editor-box {
            background-color: #fffac1;
            border: 1px solid #17354d;
            padding: 15px;
            margin-bottom: 20px;
        }

        .post-input {
            width: 100%;
            background: transparent;
            border: none;
            resize: none;
            font-family: sans-serif;
            font-size: 14px;
            outline: none;
            min-height: 100px;
            color: #17354d;
        }

        .editor-controls {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        /* ── Image Preview ── */
        .preview-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .preview-item {
            position: relative;
            width: 50px;
            height: 50px;
            border: 1px solid #17354d;
        }

        .preview-item img { width: 100%; height: 100%; object-fit: cover; }

        .preview-remove {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e46b22;
            color: white;
            border-radius: 20%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            font-family: sans-serif;
        }

        /* ── Post List ── */
        .post-item {
            border-bottom: 1px solid #17354d;
            padding: 15px 0;
            color: #17354d;
            display: flex;
            flex-direction: column;
        }

        .post-item > div:nth-child(2) { white-space: pre-wrap; word-break: break-all; }

        .post-actions {
            align-self: flex-end;
            display: flex;
            gap: 8px;
            font-size: 7px;
            color: #fffac1;
            cursor: pointer;
            margin-bottom: 5px;
        }

        /* ── Diary Cards ── */
        .diary-card {
            background-color: #3b74a7;
            border: 2px solid #17354d;
            margin-bottom: 25px;
            padding: 15px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.08s ease, border-bottom-width 0.08s ease;
            border-bottom-width: 5px;
        }

        .diary-card:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }

        .diary-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border: 1px solid #17354d;
            background-color: #5a8fb1;
            margin-bottom: 12px;
            display: block;
        }

        .diary-card-title {
            color: #fffac1;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 2px;
        }

        .diary-card-date {
            color: #fffac1;
            font-size: 8px;
            font-family: 'Press Start 2P';
            opacity: 0.8;
            letter-spacing: -0.5px;
        }

        .gb-buttons {
            position: absolute;
            right: 15px;
            bottom: 15px;
            display: flex;
            gap: 8px;
            transform: rotate(-30deg);
        }

        .gb-btn {
            width: 22px;
            height: 22px;
            background-color: #17354d;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P';
            font-size: 10px;
            color: #5a8fb1;
        }

        /* ── Diary Detail View ── */
        #diary-detail-view {
            display: none;
            color: #17354d;
            min-height: 500px;
            padding-bottom: 50px;
        }

        .detail-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #17354d;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .detail-title {
            font-size: 20px;
            font-family: sans-serif;
            font-weight: bold;
            margin-bottom: 5px;
            color: #17354d;
        }

        .detail-date {
            font-family: 'Press Start 2P';
            font-size: 10px;
            color: #fffac1;
        }

        .detail-actions {
            display: flex;
            gap: 10px;
            font-size: 8px;
            font-family: 'Press Start 2P';
            color: #fffac1;
            cursor: pointer;
        }

        .detail-images img {
            width: 100%;
            margin-bottom: 15px;
            border: 1px solid #17354d;
            cursor: zoom-in;
        }

        .detail-content {
            font-family: sans-serif;
            font-size: 15px;
            line-height: 1.7;
            color: #17354d;
            margin-bottom: 30px;
        }

        /* ── Diary Full Editor ── */
        #diary-full-editor {
            display: none;
            background-color: #fffac1;
            border: 1px solid #17354d;
            padding: 20px;
        }

        #diaryTitleInput {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #17354d;
            font-family: sans-serif;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 0;
            outline: none;
            margin-bottom: 15px;
        }

        #diaryContentInput {
            width: 100%;
            background: transparent;
            border: none;
            resize: none;
            font-family: sans-serif;
            font-size: 14px;
            outline: none;
            min-height: 250px;
            line-height: 1.6;
        }

        /* ── Image Modal ── */
        #imgModal {
            display: none;
            position: fixed;
            z-index: 9999;
            inset: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        #imgModal img { max-width: 95%; max-height: 95%; object-fit: contain; }

        /* ── Misc ── */
        #youtube-player { display: none; }

        .backup-text {
            font-size: 10px;
            color: #1a2a3a;
            cursor: pointer;
            transition: color 0.3s;
        }

        .backup-text:hover { color: #ffffff; }

        /* ── Pagination ── */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding-bottom: 20px;
        }

        .page-btn {
            cursor: pointer;
            color: #fffac1;
            font-family: 'Press Start 2P';
            font-size: 10px;
            transition: transform 0.08s ease;
        }

        .page-btn:active { transform: scale(0.9); }
        .page-btn.active { color: #e46b22; text-decoration: underline; }

        /* ── Animations ── */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinning { animation: spin 3s linear infinite; }

        @keyframes blink-color {
            0%, 100% { color: #fffac1; }
            50% { color: #f8cf39; }
        }

        .blinking-text {
            font-family: 'Press Start 2P';
            font-size: 16px;
            animation: blink-color 1s infinite;
        }

        /* ── Global Search Bar ── */
        .global-search-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            margin-bottom: 14px;
        }

        .search-icon {
            font-size: 11px;
            opacity: 0.4;
            color: #17354d;
            flex-shrink: 0;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(23, 53, 77, 0.3);
            padding: 4px 2px;
            font-family: 'Press Start 2P';
            font-size: 8px;
            color: #17354d;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus { border-bottom-color: rgba(23, 53, 77, 0.65); }
        .search-input::placeholder { color: #17354d; opacity: 0.3; }

        .search-clear {
            font-size: 10px;
            color: #17354d;
            opacity: 0;
            cursor: pointer;
            transition: opacity 0.15s;
            flex-shrink: 0;
        }

        .search-clear.visible { opacity: 0.35; }
        .search-clear.visible:hover { opacity: 0.7; }

        .search-count {
            font-family: 'Press Start 2P';
            font-size: 8px;
            color: #f8cf39;
            text-align: right;
            margin-bottom: 10px;
            min-height: 14px;
        }

        mark.hl {
            background: #f8cf39;
            color: #17354d;
            border-radius: 2px;
            padding: 0 1px;
        }

        /* ── Coin insert flash on load ── */
        @keyframes coin-flash {
            0%   { opacity: 0; transform: scale(0.85); }
            15%  { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        #app { animation: coin-flash 0.4s ease-out both; }
    </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen" onclick="enterApp()">
    <div class="blinking-text">⭐️ PRESS START ⭐️</div>
</div>

<div id="app">
    <header>
        <div class="global-search-bar">

<div id="imgModal" onclick="this.style.display='none'"><img id="modalImg"></div>

<!-- Firebase Module -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
        getFirestore, collection, addDoc, getDocs, query, orderBy,
        doc, deleteDoc, updateDoc, getCountFromServer, limit, startAfter
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import {
        getStorage, ref, uploadBytes, getDownloadURL, deleteObject
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBHMSPEsozQp2ZcanrRWy0-ZE7aoxviDgE",
        authDomain: "nalleum.firebaseapp.com",
        projectId: "nalleum",
        storageBucket: "nalleum.firebasestorage.app",
        messagingSenderId: "889977175883",
        appId: "1:889977175883:web:553b25bd73cb0d758332ce"
    };

    const app     = initializeApp(firebaseConfig);
    const db      = getFirestore(app);
    const storage = getStorage(app);

    window.db      = db;
    window.storage = storage;
    window.fbActions = {
        ref, uploadBytes, getDownloadURL,
        addDoc, collection, getDocs, query, orderBy,
        doc, deleteDoc, updateDoc, deleteObject,
        getCountFromServer, limit
    };

    // ── Pagination state ──
    const POSTS_PER_PAGE = 20;
    let lastVisible = [];

    async function loadPosts(type, page = 1) {
        const coll  = collection(window.db, type);
        const snap  = await getCountFromServer(coll);
        const total = Math.ceil(snap.data().count / POSTS_PER_PAGE) || 1;

        const q = (page === 1)
            ? query(coll, orderBy("createdAt", "desc"), limit(POSTS_PER_PAGE))
            : query(coll, orderBy("createdAt", "desc"), startAfter(lastVisible[page - 2]), limit(POSTS_PER_PAGE));

        const result = await getDocs(q);
        lastVisible[page - 1] = result.docs[result.docs.length - 1];

        window[type.toLowerCase() + 'Posts'] = result.docs.map(d => ({ id: d.id, ...d.data() }));
        renderBoard(type);
        renderPagination(type, page, total);
    }

    function renderPagination(type, current, total) {
        const container = document.getElementById(type.toLowerCase() + '-pagination');
        container.innerHTML = Array.from({ length: total }, (_, i) => i + 1)
            .map(i => `<span class="page-btn ${i === current ? 'active' : ''}" onclick="loadPosts('${type}', ${i})">[${i}]</span>`)
            .join('');
    }

    async function loadDiary() {
        const { getDocs, collection, query, orderBy } = window.fbActions;
        const q    = query(collection(window.db, 'DIARY'), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        window.diaryPosts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderBoard('DIARY');
    }

    loadPosts('BUBBLE', 1);
    loadPosts('NEG', 1);
    loadDiary();

    window.loadPosts = loadPosts;
    window.loadDiary = loadDiary;
</script>

<!-- App Logic -->
<script>
    // ── State ──
    let tempImages = [];
    let tempFiles  = [];
    let editDiaryId = null;
    let editPostId  = null;
    let player, isPlaying = false;
    const DEFAULT_IMAGES = ["default1.png", "default2.png"];

    // ── Loading screen ──
    function enterApp() {
        const loader = document.getElementById('loading-screen');
        loader.style.transition = 'opacity 0.5s';
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
    }

    window.addEventListener('load', enterApp);

    // ── Tab switching ──
    function switchTab(tab) {
        ['BUBBLE', 'NEG', 'DIARY'].forEach(t => {
            document.getElementById('tab' + t.charAt(0) + t.slice(1).toLowerCase()).classList.toggle('active', t === tab);
            document.getElementById(t.toLowerCase() + '-container').style.display = (t === tab) ? 'block' : 'none';
        });
        document.getElementById('diary-full-editor').style.display  = 'none';
        document.getElementById('diary-detail-view').style.display  = 'none';
    }

    // ── Search ──
    let searchQuery = '';

    function onSearch() {
        const input = document.getElementById('global-search');
        searchQuery = input.value.trim();
        const clearBtn = document.getElementById('search-clear-btn');
        clearBtn.classList.toggle('visible', searchQuery.length > 0);
        // hide pagination during search
        ['bubble','neg'].forEach(t => {
            const pg = document.getElementById(t + '-pagination');
            if (pg) pg.style.display = searchQuery ? 'none' : 'flex';
        });
        renderBoard('BUBBLE');
        renderBoard('NEG');
        renderBoard('DIARY');
    }

    function clearSearch() {
        searchQuery = '';
        document.getElementById('global-search').value = '';
        document.getElementById('search-clear-btn').classList.remove('visible');
        ['bubble','neg'].forEach(t => {
            const pg = document.getElementById(t + '-pagination');
            if (pg) pg.style.display = 'flex';
            document.getElementById(t + '-search-count').innerText = '';
        });
        document.getElementById('diary-search-count').innerText = '';
        renderBoard('BUBBLE');
        renderBoard('NEG');
        renderBoard('DIARY');
    }

    function highlight(text, kw) {
        if (!kw) return text;
        const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return text.replace(new RegExp(escaped, 'gi'), m => `<mark class="hl">${m}</mark>`);
    }

    // ── Render ──
    function linkify(text) {
        return text.replace(/(https?:\/\/[^\s]+)/g,
            url => `<a href="${url}" target="_blank" style="color:#227be4; text-decoration:underline;">${url}</a>`);
    }

    function renderBoard(type) {
        if (type === 'DIARY') return renderDiary();

        const kw        = searchQuery;
        let   posts     = window[type.toLowerCase() + 'Posts'] || [];
        const container = document.getElementById(type.toLowerCase() + '-list');
        const countEl   = document.getElementById(type.toLowerCase() + '-search-count');

        if (kw) {
            const kwLower = kw.toLowerCase();
            posts = posts.filter(p => (p.content || '').toLowerCase().includes(kwLower));
            countEl.innerText = `${posts.length} RESULT${posts.length !== 1 ? 'S' : ''} FOUND`;
        } else {
            countEl.innerText = '';
        }

        container.innerHTML = posts.map(p => `
            <div class="post-item">
                <div class="post-actions">
                    <span onclick="startEditPost('${type}', '${p.id}')">EDIT</span>
                    <span onclick="deletePost('${type}', '${p.id}', ${JSON.stringify(p.images || [])})">DEL</span>
                </div>
                <div style="font-family:sans-serif; font-size:14px; padding-right:10px;">${highlight(linkify(p.content), kw)} <span style="color:#fffac1; font-size:9px;">${p.date}</span></div>
                <div style="display:flex; gap:5px; margin-top:10px; flex-wrap:wrap;">
                    ${(p.images || []).map(img =>
                        `<img src="${img}" onclick="showModal('${img}')"
                              style="width:70px; height:70px; object-fit:cover; border:1px solid #17354d; cursor:zoom-in;">`
                    ).join('')}
                </div>
            </div>
        `).join('');
    }

    function renderDiary() {
        const container = document.getElementById('diary-list');
        const kw        = searchQuery;
        let   posts     = window.diaryPosts || [];
        const countEl   = document.getElementById('diary-search-count');

        if (kw) {
            const kwLower = kw.toLowerCase();
            posts = posts.filter(p =>
                (p.title || '').toLowerCase().includes(kwLower) ||
                (p.content || '').toLowerCase().includes(kwLower)
            );
            countEl.innerText = `${posts.length} RESULT${posts.length !== 1 ? 'S' : ''} FOUND`;
        } else {
            countEl.innerText = '';
        }

        if (posts.length === 0) {
            container.innerHTML = `<div style="color:#fffac1; text-align:center; padding:20px; font-size:10px;">${kw ? 'NO RESULTS.' : 'NO ADVENTURES YET.'}</div>`;
            return;
        }

        container.innerHTML = posts.map(p => {
            const thumb = (p.images && p.images.length > 0)
                ? p.images[0]
                : DEFAULT_IMAGES[Math.floor(Math.random() * DEFAULT_IMAGES.length)];
            return `
                <div class="diary-card" onclick="openDiaryDetail('${p.id}')">
                    <img class="diary-thumb" src="${thumb}">
                    <div class="diary-card-info">
                        <div class="diary-card-title">${highlight(p.title, kw)}</div>
                        <div class="diary-card-date">${p.date}</div>
                    </div>
                    <div class="gb-buttons">
                        <div class="gb-btn">B</div>
                        <div class="gb-btn">A</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ── Diary navigation ──
    function openDiaryDetail(id) {
        const post = window.diaryPosts.find(p => p.id === id);
        if (!post) return;

        document.getElementById('diary-container').style.display   = 'none';
        document.getElementById('diary-detail-view').style.display = 'block';
        document.getElementById('detailTitle').innerText   = post.title;
        document.getElementById('detailDate').innerText    = post.date;
        document.getElementById('detailContent').innerHTML = post.content.replace(/\n/g, '<br>');
        document.getElementById('detailImages').innerHTML  =
            (post.images || []).map(img => `<img src="${img}" onclick="showModal('${img}')">`).join('');
        document.getElementById('detailEditBtn').onclick = () => startEditDiary(post.id);
        document.getElementById('detailDelBtn').onclick  = () => deletePost('DIARY', post.id, post.images);
        window.scrollTo(0, 0);
    }

    function closeDiaryDetail() {
        document.getElementById('diary-detail-view').style.display = 'none';
        document.getElementById('diary-container').style.display   = 'block';
    }

    function openDiaryEditor() {
        document.getElementById('diary-container').style.display   = 'none';
        document.getElementById('diary-detail-view').style.display = 'none';
        document.getElementById('diary-full-editor').style.display = 'block';

        editDiaryId = null;
        document.getElementById('diarySendBtn').innerText     = 'SEND';
        document.getElementById('diaryTitleInput').value      = '';
        document.getElementById('diaryContentInput').value    = '';
        tempImages = [];
        tempFiles  = [];
        updatePreview('diary-previews');
    }

    function closeDiaryEditor() {
        document.getElementById('diary-full-editor').style.display = 'none';
        document.getElementById('diary-container').style.display   = 'block';
    }

    // ── Image handling ──
    function handleImg(input, type) {
        Array.from(input.files).forEach(file => {
            tempFiles.push(file);
            const reader = new FileReader();
            reader.onload = e => {
                tempImages.push(e.target.result);
                updatePreview(type.toLowerCase() + '-previews');
            };
            reader.readAsDataURL(file);
        });
    }

    function updatePreview(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = tempImages.map((src, i) => `
            <div class="preview-item">
                <img src="${src}">
                <div class="preview-remove" onclick="removeTempImage(${i}, '${containerId}')">×</div>
            </div>
        `).join('');
    }

    function removeTempImage(index, containerId) {
        tempImages.splice(index, 1);
        tempFiles.splice(index, 1);
        updatePreview(containerId);
    }

    // ── Save post ──
    async function savePost(type) {
        const btnId = type.toLowerCase() + 'SendBtn';
        const btn   = document.getElementById(btnId);
        btn.innerText = "SAVING...";
        btn.disabled  = true;

        const now  = new Date();
        const date = `[${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}]`;
        const { ref, uploadBytes, getDownloadURL, addDoc, collection, updateDoc, doc } = window.fbActions;

        try {
            // Upload new files
            const imageUrls = [];
            for (const file of tempFiles) {
                const storageRef = ref(window.storage, `images/${Date.now()}_${file.name}`);
                await uploadBytes(storageRef, file);
                imageUrls.push(await getDownloadURL(storageRef));
            }

            if (type === 'BUBBLE' || type === 'NEG') {
                const inputEl = document.getElementById(type.toLowerCase() + '-text');
                const content = inputEl.value;

                if (editPostId) {
                    const merged = [...tempImages.filter(img => img.startsWith('http')), ...imageUrls];
                    await updateDoc(doc(window.db, type, editPostId), { content, images: merged });
                    editPostId = null;
                } else {
                    await addDoc(collection(window.db, type), { content, images: imageUrls, date, createdAt: Date.now() });
                }
                inputEl.value = '';
                loadPosts(type, 1);
            } else {
                const title   = document.getElementById('diaryTitleInput').value || "NO TITLE";
                const content = document.getElementById('diaryContentInput').value;

                if (editDiaryId) {
                    const merged = [...tempImages.filter(img => img.startsWith('http')), ...imageUrls];
                    await updateDoc(doc(window.db, "DIARY", editDiaryId), { title, content, images: merged });
                    editDiaryId = null;
                } else {
                    await addDoc(collection(window.db, "DIARY"), { title, content, images: imageUrls, date, createdAt: Date.now() });
                }
                closeDiaryEditor();
                loadDiary();
            }

            tempImages = [];
            tempFiles  = [];
            updatePreview(type.toLowerCase() + '-previews');
        } catch (e) {
            console.error(e);
            alert("저장 실패!");
        }

        btn.innerText = "SEND";
        btn.disabled  = false;
    }

    // ── Delete post ──
    async function deletePost(type, id, images) {
        if (!confirm("✂️정말 삭제하시겠습니까?")) return;
        const { doc, deleteDoc, ref, deleteObject } = window.fbActions;
        try {
            await deleteDoc(doc(window.db, type, id));
            if (images) {
                for (const url of images) {
                    try {
                        const imgPath = decodeURIComponent(url.split('/o/')[1].split('?')[0]);
                        await deleteObject(ref(window.storage, imgPath));
                    } catch (e) {}
                }
            }
            if (type === 'DIARY') { closeDiaryDetail(); loadDiary(); }
            else loadPosts(type, 1);
        } catch (e) { console.error(e); }
    }

    // ── Edit ──
    function startEditPost(type, id) {
        const post = window[type.toLowerCase() + 'Posts'].find(x => x.id === id);
        document.getElementById(type.toLowerCase() + '-text').value = post.content;
        tempImages = [...(post.images || [])];
        updatePreview(type.toLowerCase() + '-previews');
        editPostId = id;
        document.getElementById(type.toLowerCase() + 'SendBtn').innerText = 'EDIT';
        window.scrollTo(0, 0);
    }

    function startEditDiary(id) {
        const post = window.diaryPosts.find(x => x.id === id);
        openDiaryEditor();
        document.getElementById('diaryTitleInput').value   = post.title;
        document.getElementById('diaryContentInput').value = post.content;
        tempImages = [...(post.images || [])];
        updatePreview('diary-previews');
        editDiaryId = id;
        document.getElementById('diarySendBtn').innerText = 'EDIT';
    }

    // ── Modal ──
    function showModal(src) {
        document.getElementById('modalImg').src        = src;
        document.getElementById('imgModal').style.display = 'flex';
    }

    // ── Music ──
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            height: '0', width: '0',
            videoId: 'GMxzozfVzxI',
            playerVars: { autoplay: 0, loop: 1, playlist: 'GMxzozfVzxI' },
            events: {
                onStateChange: function(e) {
                    if (e.data === YT.PlayerState.ENDED) {
                        player.seekTo(0);
                        player.playVideo();
                    }
                }
            }
        });
    }

    function toggleMusic() {
        const btn  = document.getElementById('playBtn');
        const star = document.getElementById('star');

        if (!isPlaying) {
            player.playVideo();
            btn.innerText = 'STOP';
            btn.classList.add('playing');
            star.classList.add('spinning');
        } else {
            player.pauseVideo();
            btn.innerText = 'PLAY';
            btn.classList.remove('playing');
            star.classList.remove('spinning');
        }
        isPlaying = !isPlaying;
    }

    // ── Backup ──
    async function backupToMarkdown() {
        const { getDocs, collection, query, orderBy } = window.fbActions;
        const q    = query(collection(window.db, "BUBBLE"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);

        const zip       = new JSZip();
        const imgFolder = zip.folder("images");
        let md = "# NALLEUM BUBBLE BACKUP\n\n";

        for (const d of snap.docs) {
            const data = d.data();
            md += `## ${data.date}\n${data.content}\n`;

            if (data.images) {
                for (let i = 0; i < data.images.length; i++) {
                    const fileName = `img_${d.id}_${i}.png`;
                    const blob     = await (await fetch(data.images[i])).blob();
                    imgFolder.file(fileName, blob);
                    md += `![img](images/${fileName})\n`;
                }
            }
            md += "\n---\n\n";
        }

        zip.file("backup.md", md);
        const content = await zip.generateAsync({ type: "blob" });
        const a = document.createElement('a');
        a.href     = URL.createObjectURL(content);
        a.download = `nalleum_backup_${new Date().toISOString().split('T')[0]}.zip`;
        a.click();
    }

    // ── Ctrl+Enter to send ──
    ['bubble-text', 'neg-text', 'diaryContentInput'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                if (id === 'bubble-text')        savePost('BUBBLE');
                else if (id === 'neg-text')      savePost('NEG');
                else if (id === 'diaryContentInput') savePost('DIARY');
            }
        });
    });
</script>
