<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

// [중요] 본인의 firebaseConfig를 여기에 넣으세요!
const firebaseConfig = {
    apiKey: "AIzaSyBHMSPEsozQp2ZcanrRWy0-ZE7aoxviDgE",
    authDomain: "nalleum.firebaseapp.com",
    projectId: "nalleum",
    storageBucket: "nalleum.firebasestorage.app",
    messagingSenderId: "889977175883",
    appId: "1:889977175883:web:553b25bd73cb0d758332ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app); 

window.db = db;
window.storage = storage;
// 도구들을 더 직접적으로 할당
window.fb = { addDoc, collection, doc, deleteDoc, updateDoc, onSnapshot, query, orderBy, getDocs, ref, uploadBytes, getDownloadURL, deleteObject };

// 실시간 감시 (이게 있어야 기기 상관없이 똑같이 보임)
onSnapshot(query(collection(db, "BUBBLE"), orderBy("createdAt", "desc")), (snap) => {
    window.posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderBubble();
});

onSnapshot(query(collection(db, "DIARY"), orderBy("createdAt", "desc")), (snap) => {
    window.diaryPosts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderDiary();
});
</script>

<script>
    // 링크 변환 함수 (트위터 카드용)
    function convertLinks(content) {
        if (!content) return "";
        const twitterRegex = /(https?:\/\/(x|twitter)\.com\/\w+\/status\/\d+\S*)/g;
        return content.replace(twitterRegex, (url) => {
            return `<div class="tweet-container" style="margin: 10px 0;"><blockquote class="twitter-tweet" data-theme="dark"><a href="${url}"></a></blockquote></div>`;
        });
    }

    // [핵심] 게시글 저장 함수 (완전 수정 버전)
    async function savePost(type) {
        const btn = type === 'BUBBLE' ? document.getElementById('bubbleSendBtn') : document.getElementById('diarySendBtn');
        btn.innerText = "SAVING...";
        btn.disabled = true;

        const date = `[${new Date().toISOString().slice(0,10).replace(/-/g,'.')}]`;
        const { ref, uploadBytes, getDownloadURL, addDoc, collection, updateDoc, doc } = window.fb;

        try {
            // 1. 이미지 업로드
            const uploadedUrls = [];
            for (const file of tempFiles) {
                const imgRef = ref(window.storage, `images/${Date.now()}_${file.name}`);
                const uploadTask = await uploadBytes(imgRef, file);
                const url = await getDownloadURL(uploadTask.ref);
                uploadedUrls.push(url);
            }

            // 기존 이미지(수정 시)와 새 이미지 합치기
            const finalImages = [...tempImages.filter(img => img.startsWith('http')), ...uploadedUrls];

            if (type === 'BUBBLE') {
                const content = document.getElementById('bubble-text').value;
                if (editBubbleId) {
                    await updateDoc(doc(window.db, "BUBBLE", editBubbleId), { content, images: finalImages });
                    editBubbleId = null;
                } else {
                    await addDoc(collection(window.db, "BUBBLE"), { content, images: finalImages, date, createdAt: Date.now() });
                }
                document.getElementById('bubble-text').value = '';
            } else {
                const title = document.getElementById('diaryTitleInput').value || "NO TITLE";
                const content = document.getElementById('diaryContentInput').value;
                if (editDiaryId) {
                    await updateDoc(doc(window.db, "DIARY", editDiaryId), { title, content, images: finalImages });
                    editDiaryId = null;
                } else {
                    await addDoc(collection(window.db, "DIARY"), { title, content, images: finalImages, date, createdAt: Date.now() });
                }
                closeDiaryEditor();
            }
            
            tempImages = []; tempFiles = []; 
            alert("✅ 저장 완료!");
        } catch (e) {
            console.error(e);
            alert("❌ 오류 발생: " + e.message);
        } finally {
            btn.innerText = "SEND";
            btn.disabled = false;
        }
    }

    // 렌더링 함수에 트위터 위젯 로드 추가
    function renderBubble() {
        const list = document.getElementById('bubble-list');
        const data = window.posts || [];
        list.innerHTML = data.map(p => `
            <div class="post-item">
                <div class="bubble-actions">
                    <span onclick="startEditBubble('${p.id}')">EDIT</span>
                    <span onclick="deletePost('BUBBLE', '${p.id}', ${JSON.stringify(p.images)})">DEL</span>
                </div>
                <div style="font-family:sans-serif; font-size:14px; padding-right:10px;">
                    ${convertLinks(p.content.replace(/\n/g, '<br>'))}
                    <div style="color:#fffac1; font-size:9px; margin-top:5px;">${p.date}</div>
                </div>
                <div style="display:flex; gap:5px; margin-top:10px; flex-wrap:wrap;">
                    ${(p.images || []).map(img => `<img src="${img}" onclick="showModal('${img}')" style="width:70px; height:70px; object-fit:cover; border:1px solid #17354d; cursor:zoom-in;">`).join('')}
                </div>
            </div>
        `).join('');
        if (window.twttr) window.twttr.widgets.load();
    }
    
    // ... 나머지 보조 함수들(handleImg, openDiaryDetail 등)은 동일하게 유지 ...
</script>
