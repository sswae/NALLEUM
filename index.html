<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NALLEUM</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <style>
        * { box-sizing: border-box; text-shadow: none !important; box-shadow: none !important; }
        body { background-color: #78a2b9; font-family: 'Press Start 2P', cursive; margin: 0; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 480px; min-height: 100vh; padding: 20px; position: relative; }

        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 28px; color: #17354d; letter-spacing: 2px; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-top: 30px; margin-bottom: 10px; }
        .tab-btn, .music-btn { background: none; border: 2px solid #17354d; border-radius: 20px; padding: 8px 15px; font-family: inherit; font-size: 11px; cursor: pointer; color: #17354d; }
        .tab-btn.active { background-color: #fffac1; }
        .music-btn.playing { background-color: #e46b22; color: #fffac1; }

        #bubble-editor { background-color: #fffac1; border: 1px solid #17354d; padding: 15px; margin-bottom: 20px; }
        #bubble-text { width: 100%; background: transparent; border: none; resize: none; font-family: sans-serif; font-size: 14px; outline: none; min-height: 100px; color: #17354d; }
        
        .post-item { border-bottom: 1px solid #17354d; padding: 15px 0; color: #17354d; display: flex; flex-direction: column; position: relative; }
        .bubble-actions { align-self: flex-end; display: flex; gap: 8px; font-size: 7px; color: #fffac1; cursor: pointer; margin-bottom: 5px; }

        .diary-card { background-color: #3b74a7; border: 2px solid #17354d; margin-bottom: 25px; padding: 15px; cursor: pointer; position: relative; overflow: hidden; }
        .diary-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; border: 1px solid #17354d; background-color: #5a8fb1; margin-bottom: 12px; display: block; }
        .diary-card-title { color: #fffac1; font-family: sans-serif; font-weight: bold; font-size: 15px; margin-bottom: 2px; }
        .diary-card-date { color: #fffac1; font-size: 8px; font-family: 'Press Start 2P'; opacity: 0.8; }

        .gb-buttons { position: absolute; right: 15px; bottom: 15px; display: flex; gap: 8px; transform: rotate(-30deg); }
        .gb-btn { width: 22px; height: 22px; background-color: #17354d; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-family: 'Press Start 2P'; font-size: 10px; color: #5a8fb1; }

        #diary-detail-view { display: none; color: #17354d; min-height: 500px; padding-bottom: 50px; }
        .detail-header-row { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #17354d; padding-bottom: 10px; margin-bottom: 25px; }
        .detail-title { font-size: 20px; font-family: sans-serif; font-weight: bold; margin-bottom: 5px; color: #17354d; }
        .detail-date { font-family: 'Press Start 2P'; font-size: 10px; color: #fffac1; }
        .detail-actions { display: flex; gap: 10px; font-size: 8px; color: #fffac1; cursor: pointer; }
        .detail-images img { width: 100%; margin-bottom: 15px; border: 1px solid #17354d; cursor: zoom-in; }
        .detail-content { font-family: sans-serif; font-size: 15px; line-height: 1.7; color: #17354d; margin-bottom: 30px; }

        #diary-full-editor { display: none; background-color: #fffac1; border: 1px solid #17354d; padding: 20px; }
        #diaryTitleInput { width: 100%; background: transparent; border: none; border-bottom: 2px solid #17354d; font-family: sans-serif; font-size: 18px; font-weight: bold; padding: 10px 0; outline: none; margin-bottom: 15px; }
        #diaryContentInput { width: 100%; background: transparent; border: none; resize: none; font-family: sans-serif; font-size: 14px; outline: none; min-height: 250px; line-height: 1.6; }
        
        .preview-container { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .preview-item { position: relative; width: 50px; height: 50px; border: 1px solid #17354d; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .preview-remove { position: absolute; top: -5px; right: -5px; background: #e46b22; color: white; border-radius: 20%; width: 18px; height: 18px; font-size: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 10; }

        .editor-controls { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
        .btn-pixel { background-color: #1a2a3a; color: #fffac1; border: 1px solid #000; padding: 8px 15px; border-radius: 20px; font-size: 10px; cursor: pointer; font-family: 'Press Start 2P'; }
        
        #imgModal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; cursor: zoom-out; }
        #imgModal img { max-width: 95%; max-height: 95%; object-fit: contain; }
        #youtube-player { display: none; }
        .backup-wrapper { text-align: center; width: 100%; margin-top: 10px; }
        .backup-text { font-size: 10px; color: #1a2a3a; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1>NALLEUM</h1>
        <div class="nav-tabs">
            <button id="tabBubble" class="tab-btn active" onclick="switchTab('BUBBLE')">BUBBLE</button>
            <button id="tabDiary" class="tab-btn" onclick="switchTab('DIARY')">DIARY</button>
            <button id="playBtn" class="music-btn" onclick="toggleMusic()">PLAY</button>
        </div>
        <div class="backup-wrapper"><span class="backup-text" onclick="backupToMarkdown()">✏️리포트를 작성하시겠습니까?</span></div>
    </header>

    <div id="youtube-player"></div>

    <div id="bubble-container">
        <div id="bubble-editor">
            <textarea id="bubble-text" placeholder="무슨 일이 일어나고 있나요"></textarea>
            <div id="bubble-previews" class="preview-container"></div>
            <div class="editor-controls">
                <input type="file" id="bubbleFile" multiple accept="image/*" onchange="handleImg(this, 'BUBBLE')" style="display:none">
                <button class="btn-pixel" onclick="document.getElementById('bubbleFile').click()">IMG</button>
                <button id="bubbleSendBtn" class="btn-pixel" onclick="savePost('BUBBLE')">SEND</button>
            </div>
        </div>
        <div id="bubble-list"></div>
    </div>

    <div id="diary-container" style="display:none">
        <div style="text-align:right; margin-bottom:15px;">
            <span style="font-size:10px; color:#fffac1; cursor:pointer; font-family:'Press Start 2P';" onclick="openDiaryEditor()">+ NEW ADVENTURE</span>
        </div>
        <div id="diary-list"></div>
    </div>

    <div id="diary-detail-view">
        <div class="detail-header-row">
            <div>
                <div id="detailTitle" class="detail-title"></div>
                <div id="detailDate" class="detail-date"></div>
            </div>
            <div class="detail-actions">
                <span id="detailEditBtn">EDIT</span>
                <span id="detailDelBtn">DEL</span>
            </div>
        </div>
        <div id="detailImages" class="detail-images"></div>
        <div id="detailContent" class="detail-content"></div>
        <div class="editor-controls">
            <button class="btn-pixel" style="background:#e46b22" onclick="closeDiaryDetail()">CLOSE</button>
        </div>
    </div>

    <div id="diary-full-editor">
        <input type="text" id="diaryTitleInput" placeholder="제목">
        <textarea id="diaryContentInput" placeholder="내용"></textarea>
        <div id="diary-previews" class="preview-container"></div>
        <div class="editor-controls">
            <input type="file" id="diaryFile" multiple accept="image/*" onchange="handleImg(this, 'DIARY')" style="display:none">
            <button class="btn-pixel" onclick="document.getElementById('diaryFile').click()">IMG</button>
            <button class="btn-pixel" id="diarySendBtn" onclick="savePost('DIARY')">SEND</button>
            <button class="btn-pixel" style="background:#e46b22" onclick="closeDiaryEditor()">BACK</button>
        </div>
    </div>
</div>

<div id="imgModal" onclick="this.style.display='none'"><img id="modalImg"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

const firebaseConfig = {
    apiKey: "AIzaSyBHMSPEsozQp2ZcanrRWy0-ZE7aoxviDgE",
    authDomain: "nalleum.firebaseapp.com",
    projectId: "nalleum",
    storageBucket: "nalleum.firebasestorage.app",
    messagingSenderId: "889977175883",
    appId: "1:889977175883:web:553b25bd73cb0d758332ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app); 

window.db = db;
window.storage = storage;
window.fb = { addDoc, collection, doc, deleteDoc, updateDoc, onSnapshot, query, orderBy, getDocs, ref, uploadBytes, getDownloadURL, deleteObject };

// 실시간 동기화
onSnapshot(query(collection(db, "BUBBLE"), orderBy("createdAt", "desc")), (snap) => {
    window.posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderBubble();
});
onSnapshot(query(collection(db, "DIARY"), orderBy("createdAt", "desc")), (snap) => {
    window.diaryPosts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderDiary();
});
</script>

<script>
    let tempImages = []; let tempFiles = [];
    let editDiaryId = null; let editBubbleId = null;
    let player, isPlaying = false;

    function convertLinks(content) {
        if (!content) return "";
        const twitterRegex = /(https?:\/\/(x|twitter)\.com\/\w+\/status\/\d+\S*)/g;
        return content.replace(twitterRegex, (url) => `<div style="margin:10px 0;"><blockquote class="twitter-tweet" data-theme="dark"><a href="${url}"></a></blockquote></div>`);
    }

    function switchTab(tab) {
        const isB = (tab === 'BUBBLE');
        document.getElementById('tabBubble').classList.toggle('active', isB);
        document.getElementById('tabDiary').classList.toggle('active', !isB);
        document.getElementById('bubble-container').style.display = isB ? 'block' : 'none';
        document.getElementById('diary-container').style.display = isB ? 'none' : 'block';
        document.getElementById('diary-full-editor').style.display = 'none';
        document.getElementById('diary-detail-view').style.display = 'none';
    }

    function handleImg(input, type) {
        Array.from(input.files).forEach(file => {
            tempFiles.push(file);
            const reader = new FileReader();
            reader.onload = (e) => { tempImages.push(e.target.result); updatePreview(type === 'BUBBLE' ? 'bubble-previews' : 'diary-previews'); };
            reader.readAsDataURL(file);
        });
    }

    function updatePreview(id) {
        document.getElementById(id).innerHTML = tempImages.map((src, i) => `<div class="preview-item"><img src="${src}"><div class="preview-remove" onclick="removeTemp(${i},'${id}')">×</div></div>`).join('');
    }

    function removeTemp(i, id) { tempImages.splice(i, 1); tempFiles.splice(i, 1); updatePreview(id); }

    async function savePost(type) {
        const btn = document.getElementById(type === 'BUBBLE' ? 'bubbleSendBtn' : 'diarySendBtn');
        btn.innerText = "SAVING..."; btn.disabled = true;
        const { ref, uploadBytes, getDownloadURL, addDoc, collection, updateDoc, doc } = window.fb;
        const date = `[${new Date().toISOString().slice(0,10).replace(/-/g,'.')}]`;

        try {
            const urls = [];
            for (const f of tempFiles) {
                const r = ref(window.storage, `images/${Date.now()}_${f.name}`);
                const t = await uploadBytes(r, f);
                urls.push(await getDownloadURL(t.ref));
            }
            const finalImgs = [...tempImages.filter(img => img.startsWith('http')), ...urls];

            if (type === 'BUBBLE') {
                const content = document.getElementById('bubble-text').value;
                if (editBubbleId) await updateDoc(doc(window.db, "BUBBLE", editBubbleId), { content, images: finalImgs });
                else await addDoc(collection(window.db, "BUBBLE"), { content, images: finalImgs, date, createdAt: Date.now() });
                document.getElementById('bubble-text').value = ''; editBubbleId = null;
            } else {
                const title = document.getElementById('diaryTitleInput').value || "NO TITLE";
                const content = document.getElementById('diaryContentInput').value;
                if (editDiaryId) await updateDoc(doc(window.db, "DIARY", editDiaryId), { title, content, images: finalImgs });
                else await addDoc(collection(window.db, "DIARY"), { title, content, images: finalImgs, date, createdAt: Date.now() });
                closeDiaryEditor();
            }
            tempImages = []; tempFiles = []; updatePreview(type === 'BUBBLE' ? 'bubble-previews' : 'diary-previews');
            btn.innerText = "SEND"; btn.disabled = false;
        } catch (e) { alert("오류!"); console.error(e); btn.innerText = "SEND"; btn.disabled = false; }
    }

    function renderBubble() {
        const list = document.getElementById('bubble-list');
        list.innerHTML = (window.posts || []).map(p => `
            <div class="post-item">
                <div class="bubble-actions"><span onclick="startEditB('${p.id}')">EDIT</span><span onclick="delPost('BUBBLE','${p.id}',${JSON.stringify(p.images)})">DEL</span></div>
                <div style="font-family:sans-serif; font-size:14px; padding-right:10px;">${convertLinks(p.content.replace(/\n/g,'<br>'))}</div>
                <div style="color:#fffac1; font-size:9px; margin-top:5px;">${p.date}</div>
                <div style="display:flex; gap:5px; margin-top:10px; flex-wrap:wrap;">${(p.images||[]).map(img => `<img src="${img}" onclick="showModal('${img}')" style="width:70px; height:70px; object-fit:cover; border:1px solid #17354d;">`).join('')}</div>
            </div>
        `).join('');
        if(window.twttr) window.twttr.widgets.load();
    }

    function renderDiary() {
        document.getElementById('diary-list').innerHTML = (window.diaryPosts || []).map(p => `
            <div class="diary-card" onclick="openDiaryDetail('${p.id}')">
                <img class="diary-thumb" src="${p.images?.[0] || 'default1.png'}">
                <div class="diary-card-title">${p.title}</div>
                <div class="diary-card-date">${p.date}</div>
                <div class="gb-buttons"><div class="gb-btn">B</div><div class="gb-btn">A</div></div>
            </div>
        `).join('');
    }

    function openDiaryDetail(id) {
        const p = window.diaryPosts.find(x => x.id === id);
        document.getElementById('diary-container').style.display = 'none';
        document.getElementById('diary-detail-view').style.display = 'block';
        document.getElementById('detailTitle').innerText = p.title;
        document.getElementById('detailDate').innerText = p.date;
        document.getElementById('detailContent').innerHTML = convertLinks(p.content.replace(/\n/g,'<br>'));
        document.getElementById('detailImages').innerHTML = (p.images||[]).map(i => `<img src="${i}" onclick="showModal('${i}')">`).join('');
        document.getElementById('detailEditBtn').onclick = () => startEditD(p.id);
        document.getElementById('detailDelBtn').onclick = () => delPost('DIARY', p.id, p.images);
        if(window.twttr) window.twttr.widgets.load();
    }

    async function delPost(type, id, imgs) {
        if(!confirm("삭제?")) return;
        const { doc, deleteDoc, ref, deleteObject } = window.fb;
        await deleteDoc(doc(window.db, type, id));
        if(imgs) for(const u of imgs) { try { const path = decodeURIComponent(u.split('/o/')[1].split('?')[0]); await deleteObject(ref(window.storage, path)); } catch(e){} }
        if(type === 'DIARY') closeDiaryDetail();
    }

    function startEditB(id) { const p = window.posts.find(x=>x.id===id); document.getElementById('bubble-text').value = p.content; tempImages = [...(p.images||[])]; updatePreview('bubble-previews'); editBubbleId = id; window.scrollTo(0,0); }
    function startEditD(id) { const p = window.diaryPosts.find(x=>x.id===id); openDiaryEditor(); document.getElementById('diaryTitleInput').value = p.title; document.getElementById('diaryContentInput').value = p.content; tempImages = [...(p.images||[])]; updatePreview('diary-previews'); editDiaryId = id; }
    
    function showModal(s) { document.getElementById('modalImg').src = s; document.getElementById('imgModal').style.display = 'flex'; }
    function closeDiaryDetail() { document.getElementById('diary-detail-view').style.display = 'none'; document.getElementById('diary-container').style.display = 'block'; }
    function openDiaryEditor() { document.getElementById('diary-container').style.display = 'none'; document.getElementById('diary-detail-view').style.display = 'none'; document.getElementById('diary-full-editor').style.display = 'block'; resetIn(); }
    function closeDiaryEditor() { document.getElementById('diary-full-editor').style.display = 'none'; document.getElementById('diary-container').style.display = 'block'; }
    function resetIn() { document.getElementById('diaryTitleInput').value = ''; document.getElementById('diaryContentInput').value = ''; tempImages = []; tempFiles = []; updatePreview('diary-previews'); editDiaryId = null; }

    function onYouTubeIframeAPIReady() { player = new YT.Player('youtube-player', { height: '0', width: '0', videoId: 'ZeAsP7JdHqU', playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'ZeAsP7JdHqU' } }); }
    function toggleMusic() { const b = document.getElementById('playBtn'); if(!isPlaying){ player.playVideo(); b.innerText='STOP'; b.classList.add('playing'); } else { player.pauseVideo(); b.innerText='PLAY'; b.classList.remove('playing'); } isPlaying = !isPlaying; }
    var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api"; document.head.appendChild(tag);

    async function backupToMarkdown() {
        const snap = await window.fb.getDocs(window.fb.query(window.fb.collection(window.db, "BUBBLE"), window.fb.orderBy("createdAt", "desc")));
        let md = "# BACKUP\n\n";
        snap.forEach(d => { const data = d.data(); md += `## ${data.date}\n${data.content}\n${(data.images||[]).map(i=>`![img](${i})`).join('\n')}\n---\n\n`; });
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([md], {type:'text/markdown'})); a.download='backup.md'; a.click();
    }
</script>
</body>
</html>
